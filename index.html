<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林嘉雍 | 品牌策划与视觉架构</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        /* 极简深邃高定美学 */
        :root {
            --bg-color: #0a0a0a;
            --text-main: #f0f0f0;
            --text-muted: #666666;
            --accent: #ffffff;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Hiragino Sans GB", "Heiti SC", "Microsoft YaHei", sans-serif;
            overflow-x: hidden;
        }
        
        /* 首屏：无重力宇航员区域 */
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .headline {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 8px;
            z-index: 10;
            text-align: center;
        }

        .sub-headline {
            font-size: 1rem;
            color: var(--text-muted);
            letter-spacing: 4px;
            margin-top: 20px;
            z-index: 10;
        }

        /* 宇航员悬浮系统 */
        .astronaut-container {
            position: absolute;
            top: 20%;
            right: 15%;
            width: 300px;
            opacity: 0.8;
            /* 核心动画：极慢的无重力上下浮动 */
            animation: float 8s ease-in-out infinite; 
            z-index: 1;
        }

        /* 高定单色处理 */
        .astronaut-img {
            width: 100%;
            filter: grayscale(100%) contrast(120%) brightness(0.8);
        }

        /* 流动安全绳 (SVG贝塞尔曲线) */
        .tether {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 400px;
            height: 400px;
            transform: translate(-120%, -20%);
            z-index: 0;
            pointer-events: none;
        }
        
        .tether path {
            fill: none;
            stroke: rgba(255, 255, 255, 0.15);
            stroke-width: 2;
            /* 流动光泽动画 */
            stroke-dasharray: 10 20;
            animation: flow 3s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes flow {
            from { stroke-dashoffset: 100; }
            to { stroke-dashoffset: 0; }
        }

        /* 作品画廊网格（准备接收后台数据） */
        .gallery-section {
            padding: 100px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .section-title {
            font-size: 1.2rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            margin-bottom: 60px;
            border-bottom: 1px solid #222;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="astronaut-container">
            <img class="astronaut-img" src="https://cdn.pixabay.com/photo/2020/05/26/07/43/astronaut-5221908_1280.png" alt="Explorer">
        </div>
        <svg class="tether" viewBox="0 0 200 200">
            <path d="M 200 50 Q 100 150 0 200" />
        </svg>

        <h1 class="headline">策略锚定，视觉失重。</h1>
        <p class="sub-headline">商业内核与高定美学的边界探索</p>
    </div>

    <div class="gallery-section">
        <div class="section-title">SELECTED WORKS // 01</div>
        
        <div id="work-grid" style="color: #666; font-weight: 300;">
            [系统正在从私有库拉取你的最新排版作品...]
        </div>
    </div>

    <script>
        // 这一小段代码确保你的后台登录功能正常
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; });
                }
            });
        }
    </script>
</body>
</html>
