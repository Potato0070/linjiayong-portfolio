<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林嘉雍 | 品牌策划与视觉架构</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        /* 极致纯粹的黑白灰高定美学 */
        :root {
            --bg-color: #0a0a0a;
            --text-main: #f0f0f0;
            --text-muted: #666666;
            --border-color: #222222;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        /* 极简首屏区 */
        .hero-section {
            height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }
        .headline {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 10px;
            margin-bottom: 10px;
        }
        .sub-headline {
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 5px;
        }

        /* 作品画廊网格 */
        .gallery-section {
            padding: 80px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }
        .section-header {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 3px;
            margin-bottom: 50px;
            text-transform: uppercase;
        }
        
        .work-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 40px;
        }

        /* 极简卡片样式 */
        .work-card {
            display: block;
            text-decoration: none;
            color: inherit;
            group: hover;
            cursor: pointer;
        }
        .work-image-placeholder {
            width: 100%;
            aspect-ratio: 4/3;
            background-color: #111;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            transition: border-color 0.4s ease;
        }
        .work-card:hover .work-image-placeholder {
            border-color: #555;
        }
        .work-title {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .work-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <h1 class="headline">策略锚定，视觉克制。</h1>
        <p class="sub-headline">商业内核与高定美学的边界探索</p>
    </div>

    <div class="gallery-section">
        <div class="section-header">SELECTED WORKS // 01</div>
        
        <div class="work-grid" id="cms-works">
            <div class="work-card">
                <div class="work-image-placeholder"></div>
                <div class="work-title">徽仨宝</div>
                <div class="work-desc">品牌全案升级与视觉架构重塑，探索地方风味的当代表达。</div>
            </div>
            
            <div class="work-card">
                <div class="work-image-placeholder"></div>
                <div class="work-title">晓棠</div>
                <div class="work-desc">高端川菜品牌策略，深邃视觉与商业定位的精准咬合。</div>
            </div>

            <div class="work-card">
                <div class="work-image-placeholder"></div>
                <div class="work-title">麦香甬</div>
                <div class="work-desc">鸡煲饭品类赛道的视觉升维与心智占领。</div>
            </div>
        </div>
    </div>

    <script>
        // 保持 Netlify 后台登录门禁正常运转
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; });
                }
            });
        }
    </script>
</body>
</html>
